  <circle cx="256" cy="384" r="48" fill="#E2000F"/>
  <!-- Temperature marks -->
  <line x1="296" y1="140" x2="340" y2="140" stroke="#E2000F" stroke-width="12" stroke-linecap="round"/>
  <line x1="296" y1="200" x2="340" y2="200" stroke="#E2000F" stroke-width="12" stroke-linecap="round"/>
  <line x1="296" y1="260" x2="340" y2="260" stroke="#E2000F" stroke-width="12" stroke-linecap="round"/>
</svg>
